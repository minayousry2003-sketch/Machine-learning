{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Diabetes Prediction</title>
    <style>
        body {
            background-image: url("{% static 'diabetes detection/images/pexels-photo-6941884.jpg' %}");
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-size: cover;
        }
        .main {
            position: fixed;
            top: 140px;
            left: 410px;
            width: 550px;
            background-color: #ffffff;
            border-radius: 10px;
            align-items: center;
            padding: 5%;
        }
        h1 {
            color: #0086b3;
            font-size: 30px;
            font-weight: bold;
        }
        input[type=submit], button {
            background-color: #4dc3ff;
            border: none;
            color: white;
            padding: 8px 16px;
            cursor: pointer;
            margin-top: 15px;
            border-radius: 5px;
        }
        .result-box {
            margin-top: 20px;
            font-size: 20px;
            font-weight: bold;
            color: #333;
        }
    </style>
</head>
<body>
<div align="center" class="main">
    <h1>Please enter the following information:</h1>
    <form action="{% url 'result' %}" method="get">
        <table>
            <tr><td align="right">Pregnancies:</td><td><input type="number" step="any" name="n1"></td></tr>
            <tr><td align="right">Glucose:</td><td><input type="number" step="any" name="n2"></td></tr>
            <tr><td align="right">Blood Pressure:</td><td><input type="number" step="any" name="n3"></td></tr>
            <tr><td align="right">Skin Thickness:</td><td><input type="number" step="any" name="n4"></td></tr>
            <tr><td align="right">Insulin:</td><td><input type="number" step="any" name="n5"></td></tr>
            <tr><td align="right">BMI:</td><td><input type="number" step="any" name="n6"></td></tr>
            <tr><td align="right">Diabetes Pedigree Function:</td><td><input type="number" step="any" name="n7"></td></tr>
            <tr><td align="right">Age:</td><td><input type="number" step="any" name="n8"></td></tr>
        </table>
        <input type="submit" value="Predict">
    </form>

    {% if result2 %}
        <div class="result-box">
            Prediction Result: {{ result2 }}
        </div>
        <div>
            <a href="{% url 'predict' %}">
                <button type="button">Test Another Case</button>
            </a>
        </div>
    {% endif %}
</div>
</body>
</html>
